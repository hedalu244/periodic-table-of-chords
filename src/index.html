<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Periodic Table of Chords</title>
</head>

<body>
    <main class="panel">
        <h1>Chord Player Demo</h1>
        <p>各ボタンで3〜4和音を再生します。連打すると前の再生を止めて次の再生へ切り替わります。</p>
        <details>
            <summary>Arpeggio Settings</summary>
            <fieldset>
                <legend>Type</legend>
                <label>
                    <input type="radio" name="arpeggio-type" value="none" checked>
                    none
                </label>
                <label>
                    <input type="radio" name="arpeggio-type" value="up-once">
                    up-once
                </label>
                <label>
                    <input type="radio" name="arpeggio-type" value="down-once">
                    down-once
                </label>
                <label>
                    <input type="radio" name="arpeggio-type" value="up-loop">
                    up-loop
                </label>
                <label>
                    <input type="radio" name="arpeggio-type" value="down-loop">
                    down-loop
                </label>
            </fieldset>

            <label for="input-arpeggio-offset-ms">Offset (ms)</label>
            <input id="input-arpeggio-offset-ms" type="number" min="0" step="1" value="170">
        </details>
        <div class="controls">
            <button id="btn-voicing-down">Voicing Down</button>
            <button id="btn-voicing-up">Voicing Up</button>
        </div>
        <button id="btn-stop" class="stop">Stop</button>
        <div class="grid">
            <button id="btn-chord-c-major7">Cmaj7</button>
            <button id="btn-chord-d-minor7">Dm7</button>
            <button id="btn-chord-e-minor7">Em7</button>
            <button id="btn-chord-f-major7">Fmaj7</button>
            <button id="btn-chord-g7">G7</button>
            <button id="btn-chord-a-minor7">Am7</button>
            <button id="btn-chord-b-minor7-flat5">B7-5</button>
        </div>
    </main>
    <script src="./main.js"></script>
</body>

</html>
