<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Periodic Table of Chords</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main class="panel">
        <section class="layout">
            <div class="torus-column">
                <div id="torus-stage">
                    <canvas id="torus-grid"></canvas>
                    <div id="torus-chord-layer"></div>
                </div>
            </div>

            <aside class="side-column">
                <section class="app-intro">
                    <h1>The Periodic Table of Chords</h1>
                </section>
                <section class="side-controls">
                    <p id="current-chord-name" class="current-chord-name">-</p>
                    <div class="controls">
                        <button id="btn-stop" class="solid-button stop">Stop</button>
                        <button id="btn-invert-down" class="hollow-button">Invert Down</button>
                        <button id="btn-invert-up" class="hollow-button">Invert Up</button>
                    </div>
                    <canvas id="keyboard-canvas"></canvas>
                    <canvas id="whisq-canvas"></canvas>
                </section>
                <section class="settings">
                    <fieldset class="option-group">
                        <legend>Arpeggio</legend>
                        <label class="radio-chip">
                            <input type="radio" name="arpeggio-type" value="none" checked>
                            <span>None</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="arpeggio-type" value="up-once">
                            <span>Up-once</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="arpeggio-type" value="down-once">
                            <span>Down-once</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="arpeggio-type" value="up-loop">
                            <span>Up-loop</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="arpeggio-type" value="down-loop">
                            <span>Down-loop</span>
                        </label>
                    </fieldset>
                    <label for="input-arpeggio-offset-ms">Amount </label>
                    <input id="input-arpeggio-offset-ms" type="number" min="0" step="1" value="170">
                    <fieldset class="option-group">
                        <legend>Visible Chord Qualities</legend>
                        <label class="checkbox-chip">
                            <input id="visibility-dim7" type="checkbox" checked>
                            <span>dim7</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-minor7" type="checkbox" checked>
                            <span>m7</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-dominant7" type="checkbox" checked>
                            <span>7</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-m7b5" type="checkbox" checked>
                            <span>m7-5</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-major" type="checkbox">
                            <span>maj</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-minor" type="checkbox">
                            <span>min</span>
                        </label>
                        <label class="checkbox-chip">
                            <input id="visibility-dim" type="checkbox">
                            <span>dim</span>
                        </label>
                    </fieldset>
                </section>
            </aside>
        </section>
    </main>
    <script src="./main.js"></script>
</body>

</html>
